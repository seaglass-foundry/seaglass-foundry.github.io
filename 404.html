<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Seaglass Foundry</title>
    <meta name="description" content="The page you requested was not found. Return to the Seaglass Foundry homepage.">
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #1a3a5c;
            --navy-dark: #0f2640;
            --teal: #4a9e8e;
            --teal-dark: #3b8273;
            --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--white);
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        h1 { font-size: 5rem; font-weight: 800; margin-bottom: 8px; }
        h1 span { color: var(--teal); }
        p { font-size: 1.15rem; color: #a8c4d8; margin-bottom: 32px; max-width: 480px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        a {
            display: inline-block;
            padding: 13px 28px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s, border-color 0.2s;
        }
        a.primary { background: var(--teal); color: var(--white); }
        a.primary:hover { background: var(--teal-dark); transform: translateY(-1px); }
        a.outline { border: 2px solid rgba(255,255,255,0.35); color: var(--white); }
        a.outline:hover { border-color: rgba(255,255,255,0.7); transform: translateY(-1px); }
    </style>
</head>
<body>
    <h1>4<span>0</span>4</h1>
    <p>The page you're looking for doesn't exist or has been moved. Try our homepage or products page instead.</p>
    <div class="actions">
        <a href="/" class="primary">Back to Home</a>
        <a href="/products/" class="outline">See Products</a>
    </div>
</body>
</html>
